  <!-- CAPACETE -->
  <g transform="translate(60 70)">
    <!-- aba -->
    <path d="M 0,160 Q 130,150 260,160 L 260,170 Q 130,180 0,170 Z" fill="#D4A912"/>
    <!-- casco -->
    <path d="M 30,160 Q 30,40 130,30 Q 230,40 230,160 Z" fill="#F5C518"/>
    <!-- listras técnicas -->
    <path d="M 30,160 Q 30,90 130,80 Q 230,90 230,160" fill="none" stroke="#D4A912" stroke-width="1.5"/>
    <!-- ventilação -->
    <rect x="105" y="55" width="6" height="14" fill="#D4A912" rx="2"/>
    <rect x="129" y="48" width="6" height="14" fill="#D4A912" rx="2"/>
    <rect x="153" y="55" width="6" height="14" fill="#D4A912" rx="2"/>

    <!-- LOGO OFICIAL frontal -->
    <image href="../logo-concrecia-mono-navy.png" x="65" y="60" width="130" height="130" preserveAspectRatio="xMidYMid meet"/>

    <!-- jugular -->
    <line x1="30" y1="160" x2="20" y2="200" stroke="#5E5B53" stroke-width="2"/>
    <line x1="230" y1="160" x2="240" y2="200" stroke="#5E5B53" stroke-width="2"/>

    <text x="130" y="230" text-anchor="middle"
      font-family="JetBrains Mono, monospace" font-size="9"
      fill="#8C887D" letter-spacing="1.5">CAPACETE — CA 31469</text>
  </g>

  <!-- CAMISA -->
  <g transform="translate(380 70)">
    <!-- gola -->
    <path d="M 130,0 L 110,30 L 150,30 Z" fill="#050F2E"/>
    <!-- corpo da camisa -->
