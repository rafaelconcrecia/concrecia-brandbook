    <rect x="60" y="156" width="140" height="2" fill="#FFD516"/>

    <!-- bolso -->
    <rect x="80" y="100" width="50" height="40" fill="none" stroke="#142A75" stroke-width="1.5"/>

    <!-- LOGO OFICIAL peito direito -->
    <image href="../logo-concrecia-white.png" x="140" y="85" width="80" height="80" preserveAspectRatio="xMidYMid meet"/>

    <text x="130" y="262" text-anchor="middle"
